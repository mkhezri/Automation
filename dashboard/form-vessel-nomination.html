<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KAU SOK — معرفی کشتی</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root {
  --primary: #1e40af;
  --secondary: #059669;
  --danger: #dc2626;
  --bg: #f1f5f9;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #0f172a;
  --muted: #64748b;
  --radius: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: 'Vazirmatn', sans-serif; font-size: 14px; color: var(--text); background: var(--bg); direction: rtl; }

.topbar {
  background: #0f172a; padding: 14px 24px;
  display: flex; align-items: center; gap: 12px;
}
.topbar-logo { font-size: 13px; font-weight: 700; color: #fff; }
.topbar-sep  { color: #475569; }
.topbar-crumb { font-size: 12.5px; color: #94a3b8; }
.topbar-back { margin-right: auto; font-size: 12.5px; color: #93c5fd; cursor: pointer; }
.topbar-back:hover { color: #fff; }

.page { max-width: 860px; margin: 28px auto; padding: 0 16px 80px; }
.page-header { margin-bottom: 22px; }
.page-header h1 { font-size: 20px; font-weight: 800; }
.page-header p { font-size: 12.5px; color: var(--muted); margin-top: 4px; }

.doc-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: #d1fae5; color: var(--secondary);
  padding: 6px 14px; border-radius: 99px;
  font-size: 13px; font-weight: 700; margin-bottom: 18px;
}

.s-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.s-card-head { display: flex; align-items: center; gap: 10px; padding: 14px 20px; background: #f8fafc; border-bottom: 1px solid var(--border); font-size: 13.5px; font-weight: 700; }
.s-num { width: 26px; height: 26px; background: var(--secondary); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; flex-shrink: 0; }
.s-body { padding: 20px; }

.fg { display: grid; gap: 14px; }
.fg-2 { grid-template-columns: 1fr 1fr; }
.fg-3 { grid-template-columns: 1fr 1fr 1fr; }
@media(max-width:600px) { .fg-2,.fg-3 { grid-template-columns: 1fr; } }

.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 12px; font-weight: 600; color: var(--muted); }
.field label span { color: var(--danger); margin-right: 2px; }
.field input, .field select {
  border: 1.5px solid var(--border); border-radius: 7px;
  padding: 9px 12px; font-size: 13.5px;
  font-family: inherit; color: var(--text); background: #fff;
  transition: border-color .15s; direction: rtl;
}
.field input:focus, .field select:focus { outline: none; border-color: var(--secondary); box-shadow: 0 0 0 3px #d1fae5; }
.unit-wrap { position: relative; }
.unit-wrap input { padding-left: 50px; }
.unit-label { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 11.5px; color: var(--muted); font-weight: 600; pointer-events: none; }

/* LETTER PREVIEW */
.letter-preview {
  border: 2px solid var(--border); border-radius: var(--radius);
  padding: 24px 28px; background: #fff;
  font-size: 13.5px; line-height: 2; direction: rtl;
}
.letter-preview .ltr-header { text-align: center; margin-bottom: 20px; }
.letter-preview .ltr-header strong { font-size: 15px; }
.letter-preview .meta { font-size: 12.5px; color: var(--muted); margin-bottom: 16px; display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; }
.letter-preview .body-text { margin: 16px 0; }
.letter-preview .highlight { font-weight: 700; color: var(--primary); }
.letter-preview .signature { margin-top: 32px; font-weight: 700; font-size: 13px; }
.letter-preview .field-ph { display: inline-block; min-width: 80px; border-bottom: 1.5px dashed #94a3b8; color: var(--muted); font-style: italic; text-align: center; }

/* ACTION BAR */
.action-bar {
  position: sticky; bottom: 0;
  background: #fff; border-top: 1px solid var(--border);
  padding: 14px 24px;
  display: flex; gap: 10px; justify-content: flex-end;
  box-shadow: 0 -4px 12px rgba(0,0,0,.06);
  margin: 0 -16px;
}
.btn { display: flex; align-items: center; gap: 7px; padding: 10px 20px; border-radius: 8px; font-size: 13.5px; font-weight: 700; cursor: pointer; font-family: inherit; border: none; transition: all .15s; }
.btn-primary { background: var(--secondary); color: #fff; }
.btn-primary:hover { background: #047857; }
.btn-ghost { background: #f1f5f9; color: var(--muted); }
.btn-ghost:hover { background: #e2e8f0; color: var(--text); }

.toast-wrap { position: fixed; bottom: 80px; left: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 18px; border-radius: 8px; background: #0f172a; color: #fff; font-size: 13px; font-weight: 500; box-shadow: 0 6px 20px rgba(0,0,0,.2); animation: su .2s ease; }
.toast.ok { background: var(--secondary); }
.toast.err { background: var(--danger); }
@keyframes su { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-logo">KAU SOK</span>
  <span class="topbar-sep">›</span>
  <span class="topbar-crumb">معرفی کشتی</span>
  <a class="topbar-back" onclick="goBack()">← بازگشت به داشبورد</a>
</div>

<div class="page">
  <div class="page-header">
    <h1>معرفی کشتی (Vessel Nomination)</h1>
    <p>KAU SOK CO. LIMITED — بازرگانی خارجی — بخش خرید</p>
  </div>

  <div class="doc-badge" id="doc-badge">🚢 شماره: در حال تولید...</div>

  <!-- SECTION 1 -->
  <div class="s-card">
    <div class="s-card-head"><div class="s-num">۱</div> اطلاعات کلی</div>
    <div class="s-body">
      <div class="fg fg-2">
        <div class="field">
          <label>تاریخ نامه <span>*</span></label>
          <input type="date" id="f-date" oninput="updatePreview()" />
        </div>
        <div class="field">
          <label>پروژه</label>
          <select id="f-project" oninput="updatePreview()">
            <option value="">— انتخاب پروژه (اختیاری) —</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- SECTION 2 -->
  <div class="s-card">
    <div class="s-card-head"><div class="s-num">۲</div> گیرنده</div>
    <div class="s-body">
      <div class="fg fg-2">
        <div class="field">
          <label>شرکت گیرنده <span>*</span></label>
          <input type="text" id="f-to-company" placeholder="e.g. Cosco Shipping" oninput="updatePreview()" />
        </div>
        <div class="field">
          <label>بندر مقصد / محل تحویل</label>
          <input type="text" id="f-to-port" placeholder="e.g. Qingdao Port" oninput="updatePreview()" />
        </div>
      </div>
    </div>
  </div>

  <!-- SECTION 3 -->
  <div class="s-card">
    <div class="s-card-head"><div class="s-num">۳</div> مشخصات کشتی</div>
    <div class="s-body">
      <div class="fg fg-2">
        <div class="field">
          <label>نام کشتی <span>*</span></label>
          <input type="text" id="f-vessel" placeholder="e.g. MV OCEAN STAR" oninput="updatePreview()" />
        </div>
        <div class="field">
          <label>پرچم (Flag)</label>
          <input type="text" id="f-flag" placeholder="e.g. Panama" oninput="updatePreview()" />
        </div>
        <div class="field">
          <label>لِیکن شروع <span>*</span></label>
          <input type="date" id="f-laycan-start" oninput="updatePreview()" />
        </div>
        <div class="field">
          <label>لِیکن پایان <span>*</span></label>
          <input type="date" id="f-laycan-end" oninput="updatePreview()" />
        </div>
        <div class="field">
          <label>بندر بارگیری <span>*</span></label>
          <input type="text" id="f-port" placeholder="e.g. Bandar Abbas" oninput="updatePreview()" />
        </div>
      </div>
    </div>
  </div>

  <!-- SECTION 4 -->
  <div class="s-card">
    <div class="s-card-head"><div class="s-num">۴</div> کالا</div>
    <div class="s-body">
      <div class="fg fg-2">
        <div class="field">
          <label>نام کالا <span>*</span></label>
          <select id="f-product" oninput="updatePreview()">
            <option value="">— انتخاب کنید —</option>
            <option>Iron Ore Concentrate</option>
            <option>Hematite</option>
            <option>Pellet</option>
            <option>Pellet Fines</option>
          </select>
        </div>
        <div class="field">
          <label>مقدار (MT)</label>
          <div class="unit-wrap">
            <input type="number" id="f-qty" placeholder="60000" min="0" oninput="updatePreview()" />
            <span class="unit-label">MT</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SECTION 5 -->
  <div class="s-card">
    <div class="s-card-head"><div class="s-num">۵</div> مشخصات فنی کشتی</div>
    <div class="s-body">
      <div class="fg fg-3">
        <div class="field">
          <label>آبخور (Draft Limit)</label>
          <div class="unit-wrap">
            <input type="number" id="f-draft" placeholder="12.5" step="0.1" oninput="updatePreview()" />
            <span class="unit-label">m</span>
          </div>
        </div>
        <div class="field">
          <label>LOA (طول کل)</label>
          <div class="unit-wrap">
            <input type="number" id="f-loa" placeholder="225" step="0.1" oninput="updatePreview()" />
            <span class="unit-label">m</span>
          </div>
        </div>
        <div class="field">
          <label>Beam (عرض)</label>
          <div class="unit-wrap">
            <input type="number" id="f-beam" placeholder="32" step="0.1" oninput="updatePreview()" />
            <span class="unit-label">m</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SECTION 6: Live Preview -->
  <div class="s-card">
    <div class="s-card-head"><div class="s-num">۶</div> پیش‌نمایش نامه رسمی</div>
    <div class="s-body">
      <div class="letter-preview" id="letter-preview">
        <!-- filled by JS -->
      </div>
    </div>
  </div>

  <div style="height:20px;"></div>
</div>

<!-- ACTION BAR -->
<div class="action-bar">
  <button class="btn btn-ghost" onclick="saveDraft()">💾 پیش‌نویس</button>
  <button class="btn btn-primary" onclick="saveFinal()">✅ ذخیره نهایی + سند Drive</button>
</div>

<div class="toast-wrap" id="toasts"></div>

<script>
// ── INIT ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  updatePreview();

  try {
    google.script.run
      .withSuccessHandler(projects => {
        const sel = document.getElementById('f-project');
        (projects || []).forEach(p => {
          const o = document.createElement('option');
          o.value = p.id || p.name;
          o.textContent = p.name;
          sel.appendChild(o);
        });
      })
      .withFailureHandler(() => {})
      .getProjects();
  } catch(e) {}
});

// ── LIVE PREVIEW ──────────────────────────────────────────────
function val(id) { return (document.getElementById(id)||{}).value || ''; }

function ph(v, label) {
  return v ? `<span class="highlight">${v}</span>` : `<span class="field-ph">${label}</span>`;
}

function updatePreview() {
  const vessel      = val('f-vessel');
  const product     = val('f-product');
  const qty         = val('f-qty');
  const laycanStart = val('f-laycan-start');
  const laycanEnd   = val('f-laycan-end');
  const port        = val('f-port');
  const date        = val('f-date');
  const toCompany   = val('f-to-company');
  const toPort      = val('f-to-port');
  const flag        = val('f-flag');
  const draft       = val('f-draft');
  const loa         = val('f-loa');
  const beam        = val('f-beam');

  const fmtDate = d => {
    if (!d) return '—';
    const dt = new Date(d);
    return isNaN(dt) ? d : new Intl.DateTimeFormat('fa-IR').format(dt);
  };

  document.getElementById('letter-preview').innerHTML = `
    <div class="ltr-header">
      <strong>KAU SOK CO. LIMITED</strong><br/>
      <span style="font-size:12px;color:#64748b;">بازرگانی خارجی — بخش خرید</span>
    </div>

    <div class="meta">
      <span style="font-weight:700;">تاریخ:</span>  <span>${fmtDate(date)}</span>
      <span style="font-weight:700;">گیرنده:</span> <span>${ph(toCompany,'نام شرکت')}${toPort ? ' — ' + toPort : ''}</span>
      <span style="font-weight:700;">موضوع:</span>  <span>معرفی کشتی جهت بارگیری ${ph(product,'نام کالا')}</span>
    </div>

    <div class="body-text">
      با سلام و احترام،
    </div>
    <div class="body-text">
      بدینوسیله کشتی ${ph(vessel,'نام کشتی')}
      ${flag ? '(پرچم ' + flag + ')' : ''}
      را جهت بارگیری ${ph(product,'کالا')} به مقدار ${ph(qty ? qty + ' MT' : '', 'مقدار')}
      با لِیکن ${ph(fmtDate(laycanStart),'تاریخ شروع')} الی ${ph(fmtDate(laycanEnd),'تاریخ پایان')}
      در بندر ${ph(port,'بندر بارگیری')} معرفی می‌نماییم.
    </div>

    ${(draft || loa || beam) ? `
    <div class="body-text" style="font-size:12.5px;color:#475569;">
      مشخصات فنی: آبخور ${draft||'—'} m | LOA: ${loa||'—'} m | Beam: ${beam||'—'} m
    </div>` : ''}

    <div class="body-text">
      خواهشمند است هماهنگی‌های لازم را به عمل آورید.
    </div>

    <div class="signature">
      با احترام،<br/>
      خضری<br/>
      <span style="font-weight:400;font-size:12px;color:#64748b;">مدیر بازرگانی — KAU SOK CO. LIMITED</span>
    </div>
  `;
}

// ── COLLECT DATA ──────────────────────────────────────────────
function collectData(status) {
  return {
    date         : val('f-date'),
    project_id   : val('f-project'),
    to_company   : val('f-to-company').trim(),
    to_port      : val('f-to-port').trim(),
    vessel_name  : val('f-vessel').trim(),
    flag         : val('f-flag').trim(),
    laycan_start : val('f-laycan-start'),
    laycan_end   : val('f-laycan-end'),
    port_loading : val('f-port').trim(),
    product      : val('f-product'),
    quantity     : val('f-qty'),
    draft_limit  : val('f-draft'),
    loa          : val('f-loa'),
    beam         : val('f-beam'),
    status       : status || 'pending'
  };
}

// ── SAVE ─────────────────────────────────────────────────────
function saveDraft() {
  submit(collectData('draft'));
}

function saveFinal() {
  const d = collectData('pending');
  if (!d.vessel_name || !d.to_company) {
    toast('نام کشتی و گیرنده الزامی است', 'err');
    return;
  }
  submit(d);
}

function submit(data) {
  toast('در حال ذخیره...', '');
  try {
    google.script.run
      .withSuccessHandler(res => {
        document.getElementById('doc-badge').textContent = '🚢 شماره: ' + res.doc_number;
        toast('✅ با موفقیت ذخیره شد — ' + res.doc_number, 'ok');
      })
      .withFailureHandler(err => toast('خطا: ' + (err.message || err), 'err'))
      .saveVesselNomination(data);
  } catch(e) {
    toast('سند ذخیره شد (حالت آزمایشی)', 'ok');
  }
}

// ── NAV ───────────────────────────────────────────────────────
function goBack() {
  try { window.top.location.href = google.script.getUrl(); }
  catch(e) { history.back(); }
}

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg, type) {
  const wrap = document.getElementById('toasts');
  const el   = document.createElement('div');
  el.className = 'toast ' + (type || '');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 3500);
}
</script>
</body>
</html>
