<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KAU SOK — مدیریت کاربران</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
:root {
  --primary        : #1e40af;
  --primary-light  : #2563eb;
  --primary-dark   : #1e3a8a;
  --danger         : #dc2626;
  --danger-light   : #ef4444;
  --secondary      : #059669;
  --warning        : #d97706;

  --content-bg     : #f1f5f9;
  --card-bg        : #ffffff;
  --card-border    : #e2e8f0;
  --card-shadow    : 0 1px 3px rgba(0,0,0,.08);

  --text-primary   : #0f172a;
  --text-secondary : #475569;
  --text-muted     : #94a3b8;

  --radius-sm      : 6px;
  --radius-md      : 10px;
  --radius-lg      : 16px;

  --transition     : all .2s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  min-height: 100%;
  font-family: 'Vazirmatn', sans-serif;
  font-size: 14px;
  color: var(--text-primary);
  background: var(--content-bg);
  direction: rtl;
}

a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }

/* ---- PAGE WRAPPER ---- */
.page-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
}

/* ---- BREADCRUMB ---- */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 24px;
}

.breadcrumb-back {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 8px 16px;
  background: var(--card-bg);
  border: 1.5px solid var(--card-border);
  border-radius: var(--radius-md);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
}

.breadcrumb-back:hover {
  border-color: var(--primary);
  color: var(--primary);
}

.breadcrumb-sep { color: var(--text-muted); }
.breadcrumb-current { font-size: 13px; color: var(--text-muted); }

/* ---- PAGE HEADER ---- */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.page-header h1 {
  font-size: 20px;
  font-weight: 800;
  color: var(--text-primary);
}

.page-header p {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 3px;
}

/* ---- BUTTONS ---- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 18px;
  border-radius: var(--radius-md);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  border: none;
  transition: var(--transition);
}

.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }

.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #b91c1c; }

.btn-outline {
  background: transparent;
  border: 1.5px solid var(--card-border);
  color: var(--text-secondary);
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }

.btn-sm { padding: 5px 11px; font-size: 12px; }

/* ---- CARD ---- */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--card-shadow);
  overflow: hidden;
  margin-bottom: 20px;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 22px;
  border-bottom: 1px solid var(--card-border);
}

.card-header h2 { font-size: 15px; font-weight: 700; }
.card-header .sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* ---- TABLE ---- */
.data-table {
  width: 100%;
  border-collapse: collapse;
}

.data-table th {
  background: #f8fafc;
  padding: 11px 16px;
  text-align: right;
  font-size: 11.5px;
  font-weight: 700;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--card-border);
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: .04em;
}

.data-table td {
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text-primary);
  border-bottom: 1px solid #f1f5f9;
  vertical-align: middle;
}

.data-table tr:last-child td { border-bottom: none; }
.data-table tbody tr:hover { background: #f8fafc; }

/* ---- ROLE BADGE ---- */
.role-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 700;
}

.role-super_admin { background: #fef3c7; color: #92400e; }
.role-admin       { background: #dbeafe; color: #1e40af; }
.role-manager     { background: #d1fae5; color: #065f46; }
.role-member      { background: #f3f4f6; color: #374151; }
.role-viewer      { background: #f1f5f9; color: #64748b; }

/* ---- STATUS BADGE ---- */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 600;
}

.status-badge::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.status-active { background: #d1fae5; color: #065f46; }
.status-active::before { background: #059669; }
.status-inactive { background: #fee2e2; color: #991b1b; }
.status-inactive::before { background: #dc2626; }

/* ---- ROLE SELECT ---- */
.role-select {
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  border: 1.5px solid var(--card-border);
  border-radius: var(--radius-sm);
  padding: 4px 8px;
  background: #fff;
  color: var(--text-primary);
  cursor: pointer;
  transition: var(--transition);
}

.role-select:focus { outline: none; border-color: var(--primary); }

/* ---- TOGGLE SWITCH ---- */
.toggle {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  cursor: pointer;
}

.toggle-track {
  width: 36px;
  height: 20px;
  background: #cbd5e1;
  border-radius: 99px;
  position: relative;
  transition: var(--transition);
  flex-shrink: 0;
}

.toggle-track.on { background: var(--secondary); }

.toggle-thumb {
  position: absolute;
  top: 2px;
  right: 2px;
  width: 16px;
  height: 16px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
  transition: var(--transition);
}

.toggle-track.on .toggle-thumb { right: 18px; }

/* ---- ACTIONS CELL ---- */
.actions-cell {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: nowrap;
}

/* ---- MODAL ---- */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(2px);
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s ease;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--card-bg);
  border-radius: var(--radius-lg);
  padding: 28px;
  width: 90%;
  max-width: 500px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.25);
  transform: scale(.95);
  transition: transform .2s ease;
}

.modal-overlay.open .modal { transform: scale(1); }

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 22px;
}

.modal-header h3 { font-size: 16px; font-weight: 700; }

.modal-close {
  width: 30px;
  height: 30px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 18px;
  transition: var(--transition);
  cursor: pointer;
}

.modal-close:hover { background: #f1f5f9; color: var(--text-primary); }

/* ---- FORM ---- */
.form-group { margin-bottom: 16px; }

.form-label {
  display: block;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.form-input, .form-select {
  width: 100%;
  font-family: inherit;
  font-size: 13px;
  padding: 9px 12px;
  border: 1.5px solid var(--card-border);
  border-radius: var(--radius-md);
  background: #fff;
  color: var(--text-primary);
  transition: var(--transition);
}

.form-input:focus, .form-select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(30,64,175,.08);
}

.form-checkbox-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.form-checkbox {
  width: 16px;
  height: 16px;
  accent-color: var(--primary);
  cursor: pointer;
}

.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 24px;
  padding-top: 18px;
  border-top: 1px solid var(--card-border);
}

/* ---- SPINNER ---- */
.spinner {
  display: inline-block;
  width: 22px;
  height: 22px;
  border: 3px solid #e2e8f0;
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: middle;
  margin-left: 8px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-row td {
  text-align: center;
  padding: 40px;
  color: var(--text-muted);
}

.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-muted);
}

.empty-state-icon { font-size: 36px; margin-bottom: 10px; }
.empty-state-text { font-size: 14px; font-weight: 500; }

/* ---- TOAST ---- */
.toast-container {
  position: fixed;
  bottom: 24px;
  left: 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 9999;
}

.toast {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 18px;
  border-radius: var(--radius-md);
  background: var(--text-primary);
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,.18);
  animation: slideUp .25s ease;
  max-width: 360px;
}

.toast.success { background: var(--secondary); }
.toast.error   { background: var(--danger); }
.toast.warning { background: var(--warning); }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ---- GLOBAL SPINNER OVERLAY ---- */
.overlay-spinner {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  display: none;
}

.overlay-spinner.show { display: flex; }

.big-spinner {
  width: 48px;
  height: 48px;
  border: 5px solid #e2e8f0;
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
</style>
</head>

<body>

<!-- Spinner overlay -->
<div class="overlay-spinner" id="overlay-spinner">
  <div class="big-spinner"></div>
</div>

<!-- Toast -->
<div class="toast-container" id="toast-container"></div>

<!-- Add User Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>افزودن کاربر جدید</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="form-group">
      <label class="form-label">آدرس ایمیل</label>
      <input class="form-input" type="email" id="f-email" placeholder="example@company.com" />
    </div>
    <div class="form-group">
      <label class="form-label">نام کامل</label>
      <input class="form-input" type="text" id="f-name" placeholder="نام و نام خانوادگی" />
    </div>
    <div class="form-group">
      <label class="form-label">نقش</label>
      <select class="form-select" id="f-role">
        <option value="viewer">بیننده</option>
        <option value="member">عضو</option>
        <option value="manager">سرپرست</option>
        <option value="admin">مدیر</option>
        <option value="super_admin">مدیر ارشد</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">دپارتمان</label>
      <input class="form-input" type="text" id="f-department" placeholder="نام دپارتمان" />
    </div>
    <div class="form-group">
      <div class="form-checkbox-row">
        <input class="form-checkbox" type="checkbox" id="f-active" checked />
        <label class="form-label" for="f-active" style="margin-bottom:0;cursor:pointer;">کاربر فعال</label>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">انصراف</button>
      <button class="btn btn-primary" onclick="submitAddUser()">ذخیره کاربر</button>
    </div>
  </div>
</div>

<!-- Page -->
<div class="page-wrapper">

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <button class="breadcrumb-back" onclick="goHome()">
      ← بازگشت به داشبورد
    </button>
    <span class="breadcrumb-sep">/</span>
    <span class="breadcrumb-current">مدیریت کاربران</span>
  </div>

  <!-- Header -->
  <div class="page-header">
    <div>
      <h1>👥 مدیریت کاربران</h1>
      <p>مدیریت کاربران و سطح دسترسی‌ها</p>
    </div>
    <button class="btn btn-primary" onclick="openModal()">
      + افزودن کاربر
    </button>
  </div>

  <!-- Users table card -->
  <div class="card">
    <div class="card-header">
      <div>
        <h2>لیست کاربران</h2>
        <div class="sub" id="users-count">در حال بارگذاری...</div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="loadUsers()">🔄 به‌روزرسانی</button>
    </div>

    <table class="data-table">
      <thead>
        <tr>
          <th>ایمیل</th>
          <th>نام</th>
          <th>نقش</th>
          <th>دپارتمان</th>
          <th>وضعیت</th>
          <th>عملیات</th>
        </tr>
      </thead>
      <tbody id="users-tbody">
        <tr class="loading-row">
          <td colspan="6"><span class="spinner"></span> در حال بارگذاری...</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<script>
// ---- Constants ----
const HOME_URL = 'https://script.google.com/macros/s/AKfycbyg-Llif04nhcv_zup8jC6g1GlYKUNPGAdAhXDboA2mfvOo-5Hd4tGKEkRmaU5ixSM/exec';

const ROLE_LABELS = {
  super_admin : 'مدیر ارشد',
  admin       : 'مدیر',
  manager     : 'سرپرست',
  member      : 'عضو',
  viewer      : 'بیننده'
};

// ---- Init ----
document.addEventListener('DOMContentLoaded', loadUsers);

// ---- Navigation ----
function goHome() {
  window.top.location.href = HOME_URL;
}

// ---- Modal ----
function openModal() {
  document.getElementById('f-email').value = '';
  document.getElementById('f-name').value = '';
  document.getElementById('f-role').value = 'viewer';
  document.getElementById('f-department').value = '';
  document.getElementById('f-active').checked = true;
  document.getElementById('add-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('add-modal').classList.remove('open');
}

document.getElementById('add-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ---- Load Users ----
function loadUsers() {
  document.getElementById('users-tbody').innerHTML =
    '<tr class="loading-row"><td colspan="6"><span class="spinner"></span> در حال بارگذاری...</td></tr>';

  if (typeof google !== 'undefined' && google.script) {
    google.script.run
      .withSuccessHandler(renderUsers)
      .withFailureHandler(onError)
      .getUsers();
  } else {
    // Dev fallback
    renderUsers([]);
  }
}

// ---- Render ----
function renderUsers(users) {
  const tbody = document.getElementById('users-tbody');
  const count = document.getElementById('users-count');

  if (!users || users.length === 0) {
    count.textContent = 'هیچ کاربری یافت نشد';
    tbody.innerHTML = `
      <tr><td colspan="6">
        <div class="empty-state">
          <div class="empty-state-icon">👤</div>
          <div class="empty-state-text">هیچ کاربری در سیستم ثبت نشده است</div>
        </div>
      </td></tr>`;
    return;
  }

  count.textContent = users.length + ' کاربر';

  tbody.innerHTML = users.map((u, idx) => {
    const email  = escHtml(u.email || '—');
    const name   = escHtml(u.name  || '—');
    const dept   = escHtml(u.department || '—');
    const role   = u.role || 'viewer';
    const active = u.active !== false && u.active !== 'FALSE' && u.active !== 0;

    const roleOptions = Object.entries(ROLE_LABELS).map(([val, lbl]) =>
      `<option value="${val}" ${val === role ? 'selected' : ''}>${lbl}</option>`
    ).join('');

    return `
      <tr id="row-${idx}">
        <td style="font-size:12.5px;">${email}</td>
        <td><strong>${name}</strong></td>
        <td>
          <select class="role-select" onchange="changeRole('${escAttr(u.email)}', this.value, this)">
            ${roleOptions}
          </select>
        </td>
        <td>${dept}</td>
        <td>
          <div class="toggle" onclick="toggleActive('${escAttr(u.email)}', ${active}, this)">
            <div class="toggle-track ${active ? 'on' : ''}">
              <div class="toggle-thumb"></div>
            </div>
            <span class="status-badge ${active ? 'status-active' : 'status-inactive'}"
                  id="status-label-${idx}">
              ${active ? 'فعال' : 'غیرفعال'}
            </span>
          </div>
        </td>
        <td>
          <div class="actions-cell">
            <button class="btn btn-danger btn-sm" onclick="deleteUser('${escAttr(u.email)}', '${escAttr(u.name)}')">
              🗑 حذف
            </button>
          </div>
        </td>
      </tr>`;
  }).join('');
}

// ---- Add User ----
function submitAddUser() {
  const data = {
    email      : document.getElementById('f-email').value.trim(),
    name       : document.getElementById('f-name').value.trim(),
    role       : document.getElementById('f-role').value,
    department : document.getElementById('f-department').value.trim(),
    active     : document.getElementById('f-active').checked
  };

  showSpinner(true);

  if (typeof google !== 'undefined' && google.script) {
    google.script.run
      .withSuccessHandler(() => {
        showSpinner(false);
        closeModal();
        showToast('کاربر با موفقیت افزوده شد', 'success');
        loadUsers();
      })
      .withFailureHandler(err => {
        showSpinner(false);
        onError(err);
      })
      .createUser(data);
  } else {
    showSpinner(false);
    closeModal();
    showToast('(حالت توسعه) کاربر افزوده شد', 'success');
  }
}

// ---- Change Role ----
function changeRole(email, newRole, selectEl) {
  showSpinner(true);

  if (typeof google !== 'undefined' && google.script) {
    google.script.run
      .withSuccessHandler(() => {
        showSpinner(false);
        showToast('نقش کاربر بروز شد', 'success');
      })
      .withFailureHandler(err => {
        showSpinner(false);
        onError(err);
      })
      .updateUser(email, { role: newRole });
  } else {
    showSpinner(false);
    showToast('(حالت توسعه) نقش بروز شد', 'success');
  }
}

// ---- Toggle Active ----
function toggleActive(email, currentActive, toggleEl) {
  const newActive = !currentActive;
  const track = toggleEl.querySelector('.toggle-track');
  const label = toggleEl.querySelector('.status-badge');

  showSpinner(true);

  if (typeof google !== 'undefined' && google.script) {
    google.script.run
      .withSuccessHandler(() => {
        showSpinner(false);
        // Update UI
        if (newActive) {
          track.classList.add('on');
          label.className = 'status-badge status-active';
          label.textContent = 'فعال';
        } else {
          track.classList.remove('on');
          label.className = 'status-badge status-inactive';
          label.textContent = 'غیرفعال';
        }
        // Update onclick to reflect new state
        toggleEl.setAttribute('onclick', `toggleActive('${escAttr(email)}', ${newActive}, this)`);
        showToast(newActive ? 'کاربر فعال شد' : 'کاربر غیرفعال شد', 'success');
      })
      .withFailureHandler(err => {
        showSpinner(false);
        onError(err);
      })
      .updateUser(email, { active: newActive });
  } else {
    showSpinner(false);
    if (newActive) {
      track.classList.add('on');
      label.className = 'status-badge status-active';
      label.textContent = 'فعال';
    } else {
      track.classList.remove('on');
      label.className = 'status-badge status-inactive';
      label.textContent = 'غیرفعال';
    }
    toggleEl.setAttribute('onclick', `toggleActive('${escAttr(email)}', ${newActive}, this)`);
    showToast('(حالت توسعه) وضعیت بروز شد', 'success');
  }
}

// ---- Delete User ----
function deleteUser(email, name) {
  if (!confirm('آیا از حذف کاربر «' + name + '» اطمینان دارید؟\nاین عملیات قابل بازگشت نیست.')) return;

  showSpinner(true);

  if (typeof google !== 'undefined' && google.script) {
    google.script.run
      .withSuccessHandler(() => {
        showSpinner(false);
        showToast('کاربر با موفقیت حذف شد', 'success');
        loadUsers();
      })
      .withFailureHandler(err => {
        showSpinner(false);
        onError(err);
      })
      .deleteUser(email);
  } else {
    showSpinner(false);
    showToast('(حالت توسعه) کاربر حذف شد', 'success');
  }
}

// ---- Error Handler ----
function onError(err) {
  console.error(err);
  showToast((err && err.message) ? err.message : 'خطا در ارتباط با سرور', 'error');
}

// ---- Spinner ----
function showSpinner(show) {
  document.getElementById('overlay-spinner').classList.toggle('show', show);
}

// ---- Toast ----
function showToast(message, type) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast ' + (type || '');
  const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : type === 'warning' ? '⚠️' : 'ℹ️';
  toast.innerHTML = `<span>${icon}</span> ${escHtml(message)}`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity .3s';
    setTimeout(() => toast.remove(), 300);
  }, 3500);
}

// ---- Helpers ----
function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function escAttr(str) {
  return String(str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}
</script>
